<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART_LIKE - Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --gold: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(10,10,18,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text);
  }
  .nav-logo span { color: var(--accent2); }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--text); }

  /* ===== HERO ===== */
  .hero {
    height: 100vh;
    min-height: 600px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 120px;
    background: var(--bg);
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('assets/mainpic.jpg') center center / contain no-repeat;
    background-color: var(--bg);
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,18,0.15) 0%,
      transparent 30%,
      transparent 50%,
      rgba(10,10,18,0.5) 80%,
      rgba(10,10,18,0.95) 100%
    );
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .hero-title {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 700;
    letter-spacing: 12px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    animation: bounce 2s infinite;
  }
  .scroll-hint svg { width: 24px; height: 24px; stroke: var(--text-dim); }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* ===== SECTION ===== */
  .section { padding: 80px 32px; max-width: 1400px; margin: 0 auto; }
  .section-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .section-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 48px;
  }

  /* ===== CATALOG GRID ===== */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .catalog-card {
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: transform 0.4s, box-shadow 0.4s, border-color 0.4s;
  }
  .catalog-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(108,92,231,0.15);
    border-color: var(--accent);
  }
  .catalog-card.featured {
    grid-column: span 2;
  }
  .catalog-card-image {
    position: relative;
    width: 100%;
    height: 240px;
    overflow: hidden;
  }
  .catalog-card.featured .catalog-card-image {
    height: 320px;
  }
  .catalog-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s;
  }
  .catalog-card:hover .catalog-card-image img {
    transform: scale(1.05);
  }
  .catalog-card-image.lock-card {
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-cover {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .catalog-card:hover .lock-cover { opacity: 1; }
  .card-count {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10,10,18,0.7);
    backdrop-filter: blur(8px);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .lock-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(108,92,231,0.8);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
  }
  .catalog-card-body { padding: 20px; }
  .catalog-card-body h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .catalog-card-body p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-tags span {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ===== CATEGORY PAGE ===== */
  .category-page {
    display: none;
    min-height: 100vh;
    padding-top: 80px;
  }
  .category-page.active { display: block; }
  .catalog-page.hidden { display: none; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: all 0.3s;
    margin-bottom: 32px;
  }
  .back-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .cat-header {
    margin-bottom: 48px;
  }
  .cat-header h2 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .cat-header p {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ===== SUB-TABS ===== */
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .sub-tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .sub-tab.active, .sub-tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ===== GALLERY ===== */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .gallery-item {
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .gallery-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .gallery-item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    transition: transform 0.5s;
  }
  .gallery-item:hover img { transform: scale(1.04); }
  .gallery-item-label {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gallery-item.is-video { position: relative; }
  .gallery-item.is-video img { filter: brightness(0.7); }
  .gallery-item .play-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(108,92,231,0.85); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .gallery-item .play-icon::after {
    content: ''; display: block;
    width: 0; height: 0;
    border-style: solid; border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox-img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 8px;
    user-select: none;
  }
  .lightbox-video {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 8px;
    outline: none;
    background: #000;
  }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.15); }
  .lightbox-prev { left: 20px; }
  .lightbox-next { right: 20px; }
  .lightbox-counter {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  /* ===== PASSWORD MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 400px;
    text-align: center;
  }
  .modal-box h3 {
    font-size: 20px;
    margin-bottom: 8px;
  }
  .modal-box p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }
  .modal-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input.error { border-color: #e74c3c; }
  .modal-submit {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
  }
  .modal-submit:hover { background: var(--accent2); }
  .modal-error {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 40px 32px;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }

  /* ===== ANIMATIONS ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s, transform 0.7s;
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .catalog-grid { grid-template-columns: 1fr; }
    .catalog-card.featured { grid-column: span 1; }
    .gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .nav-links { display: none; }
  }
  @media (max-width: 500px) {
    .section { padding: 48px 16px; }
    nav { padding: 12px 16px; }
    .hero { padding-bottom: 80px; }
    .gallery { grid-template-columns: 1fr 1fr; }
    .gallery-item img { height: 150px; }
  }
</style>
</head>

// ===== HELPERS =====
function fp(dir, file) {
  return BASE + '/' + dir + '/' + encodeURIComponent(file);
}

function countItems(cat) {
  if (cat.subCategories) {
    return Object.values(cat.subCategories).reduce((s, sub) => s + sub.files.length, 0);
  }
  return cat.files.length;
}

// ===== RENDER CATALOG =====
function renderCatalog() {
  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = CATALOG.map(cat => {
    const count = countItems(cat);
    const coverSrc = fp(cat.dir, cat.cover.split('/').pop());
    const lockOnly = cat.lockIcon;
    const tagsHTML = cat.tags ? cat.tags.map(t => `<span>${t}</span>`).join('') : '';
    return `
      <div class="catalog-card fade-up ${cat.featured ? 'featured' : ''}" onclick="openCategory('${cat.id}')">
        <div class="catalog-card-image ${lockOnly ? 'lock-card' : ''}">
          ${lockOnly
            ? `<div class="lock-cover"><svg viewBox="0 0 48 48" width="48" height="48"><rect x="8" y="22" width="32" height="24" rx="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/><path d="M16 22V14a8 8 0 0 1 16 0v8" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="33" r="3" fill="rgba(255,255,255,0.25)"/></svg></div>`
            : `<img src="${coverSrc}" alt="${cat.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22200%22><rect fill=%22%231a1a24%22 width=%22400%22 height=%22200%22/><text x=%22200%22 y=%22105%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2216%22>${encodeURIComponent(cat.title)}</text></svg>'">`
          }
          <span class="card-count">${count} 件</span>
          ${cat.locked ? '<span class="lock-badge">🔒 受限</span>' : ''}
        </div>
        <div class="catalog-card-body">
          <h3>${cat.title}</h3>
          <p>${cat.desc}</p>
          <div class="card-tags">${tagsHTML}</div>
        </div>
      </div>
    `;
  }).join('');
  observeFadeUps();
}

// ===== OPEN CATEGORY =====
function openCategory(catId) {
  const cat = CATALOG.find(c => c.id === catId);
  if (!cat) return;

  if (cat.locked && !isUnlocked) {
    pendingCatId = catId;
    showPasswordModal();
    return;
  }

  document.getElementById('catalogPage').classList.add('hidden');
  const page = document.getElementById('categoryPage');
  page.classList.add('active');

  // Header
  const count = countItems(cat);
  document.getElementById('catHeader').innerHTML = `
    <h2>${cat.title}</h2>
    <p>${cat.desc} · ${count} 件作品</p>
  `;

  // Sub-tabs
  const tabsEl = document.getElementById('subTabs');
  if (cat.subCategories && Object.keys(cat.subCategories).length > 0) {
    const subs = Object.keys(cat.subCategories).filter(k => cat.subCategories[k].files.length > 0);
    tabsEl.innerHTML = `<div class="sub-tab active" onclick="showSub('all', '${catId}')">全部</div>` +
      subs.map(s => `<div class="sub-tab" onclick="showSub('${s}', '${catId}')">${s}</div>`).join('');
  } else {
    tabsEl.innerHTML = '';
  }

  // Gallery
  renderGallery(cat, 'all');
  window.scrollTo(0, 0);
}

function renderGallery(cat, sub) {
  const gallery = document.getElementById('gallery');
  let items = [];

  if (sub === 'all') {
    if (cat.subCategories) {
      for (const [name, data] of Object.entries(cat.subCategories)) {
        data.files.forEach(f => items.push({ file: f, dir: cat.dir, sub: name }));
      }
    } else {
      cat.files.forEach(f => items.push({ file: f, dir: cat.dir, sub: null }));
    }
  } else {
    if (cat.subCategories && cat.subCategories[sub]) {
      cat.subCategories[sub].files.forEach(f => items.push({ file: f, dir: cat.dir, sub: sub }));
    }
  }

  currentImages = items.map(it => fp(it.dir, it.file));
  // Track which items are videos
  currentIsVideo = items.map(it => /\.(mp4|webm|mov|avi|mkv)$/i.test(it.file));

  gallery.innerHTML = items.map((it, i) => {
    const isVideo = currentIsVideo[i];
    const src = currentImages[i];
    if (isVideo) {
      return `
        <div class="gallery-item is-video fade-up" onclick="openLightbox(${i})">
          <video src="${src}" preload="metadata" muted></video>
          <div class="play-icon"></div>
          <div class="gallery-item-label">${it.sub ? '[' + it.sub + '] ' : ''}${it.file}</div>
        </div>`;
    }
    return `
      <div class="gallery-item fade-up" onclick="openLightbox(${i})">
        <img src="${src}" alt="${it.file}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="gallery-item-label">${it.sub ? '[' + it.sub + '] ' : ''}${it.file}</div>
      </div>`;
  }).join('');
  observeFadeUps();
}

function showSub(sub, catId) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  const cat = CATALOG.find(c => c.id === catId);
  renderGallery(cat, sub);
}

// ===== HOME =====
function goHome() {
  document.getElementById('categoryPage').classList.remove('active');
  document.getElementById('catalogPage').classList.remove('hidden');
  window.scrollTo(0, 0);
}

// ===== BACK (browser history) =====
function goBack() {
  document.getElementById('categoryPage').classList.remove('active');
  document.getElementById('catalogPage').classList.remove('hidden');
  // Scroll past the hero, to the catalog content area
  const catalogEl = document.getElementById('catalogPage');
  if (catalogEl) {
    const y = catalogEl.getBoundingClientRect().top + window.scrollY - 80;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

// ===== LIGHTBOX =====
function openLightbox(index) {
  currentLightboxIndex = index;
  const lb = document.getElementById('lightbox');
  const imgEl = document.getElementById('lightboxImg');
  const vidEl = document.getElementById('lightboxVideo');

  if (currentIsVideo[index]) {
    imgEl.style.display = 'none';
    vidEl.style.display = 'block';
    vidEl.src = currentImages[index];
    vidEl.play().catch(() => {});
  } else {
    vidEl.style.display = 'none';
    vidEl.pause();
    vidEl.src = '';
    imgEl.style.display = 'block';
    imgEl.src = currentImages[index];
  }
  document.getElementById('lightboxCounter').textContent = `${index + 1} / ${currentImages.length}`;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox')) return;
  const vidEl = document.getElementById('lightboxVideo');
  vidEl.pause();
  vidEl.src = '';
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

function navLightbox(dir) {
  currentLightboxIndex = (currentLightboxIndex + dir + currentImages.length) % currentImages.length;
  const imgEl = document.getElementById('lightboxImg');
  const vidEl = document.getElementById('lightboxVideo');

  if (currentIsVideo[currentLightboxIndex]) {
    imgEl.style.display = 'none';
    vidEl.style.display = 'block';
    vidEl.src = currentImages[currentLightboxIndex];
    vidEl.play().catch(() => {});
  } else {
    vidEl.style.display = 'none';
    vidEl.pause();
    vidEl.src = '';
    imgEl.style.display = 'block';
    imgEl.src = currentImages[currentLightboxIndex];
  }
  document.getElementById('lightboxCounter').textContent = `${currentLightboxIndex + 1} / ${currentImages.length}`;
}

// ===== PASSWORD =====
function showPasswordModal() {
  document.getElementById('pwdModal').classList.add('active');
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdError').style.display = 'none';
  document.getElementById('pwdInput').classList.remove('error');
  setTimeout(() => document.getElementById('pwdInput').focus(), 100);
}

function submitPassword() {
  const val = document.getElementById('pwdInput').value;
  if (val === PASSWORD) {
    isUnlocked = true;
    document.getElementById('pwdModal').classList.remove('active');
    if (pendingCatId) openCategory(pendingCatId);
    pendingCatId = null;
  } else {
    document.getElementById('pwdError').style.display = 'block';
    document.getElementById('pwdInput').classList.add('error');
    document.getElementById('pwdInput').focus();
  }
}
document.getElementById('pwdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPassword();
});

// ===== SCROLL ANIMATIONS =====
function observeFadeUps() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((en, i) => {
      if (en.isIntersecting) {
        setTimeout(() => en.target.classList.add('visible'), i * 80);
        obs.unobserve(en.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up:not(.visible)').forEach(el => obs.observe(el));
}

// NAV scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
});

// ===== INIT =====
renderCatalog();
</script>
